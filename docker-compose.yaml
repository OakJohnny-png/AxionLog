version: '3.8'

services:
  db:
    image: postgres:15
    container_name: logistica_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: sua_senha_segura
      POSTGRES_DB: logistica_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./create_database.sql:/docker-entrypoint-initdb.d/create_database.sql

volumes:
  postgres_data:
